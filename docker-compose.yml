services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student
      POSTGRES_DB: shop
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./api
    depends_on:
      - db
    ports:
      - "5001:5000"

  client:
    build: ./client
    depends_on:
      - api
    profiles:
      - exercise
